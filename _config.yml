# Welcome to Jekyll!
# This config file is meant for settings that affect your entire site.

# ==========================
# Basic Site Settings
# ==========================
locale            : "en-US"
site_theme        : "default"
title             : "Bernard Andy"
title_separator   : "-"
name              : &name "Bernard Andy"
description       : &description "Forensic Scientist & Policy Researcher specializing in Genomic Data Governance, Ethics, and Legislative Reform in Africa."
url               : "https://BernardAndy.github.io"
baseurl           : ""
repository        : "BernardAndy/BernardAndy.github.io"

# ==========================
# Author / Sidebar
# ==========================
author:
  avatar         : "/ "me.png"
  name           : "Bernard Andy"
  bio            : "Molecular Biologist & Genomics researcher exploring systems, data & intelligent tools."
  location       : "Ibadan, Nigeria"
  employer       : "Lead City University"
  email          : "andybernardcc@gmail.com"
  # Academic
  academia       : "https://leadcity.academia.edu/AndyBernard"
  orcid          : "https://orcid.org/0009-0005-9480-3086"
  researchgate   : "https://www.researchgate.net/profile/Andy-Bernard"
  # Social
  linkedin       : "realabernard"
  twitter        : "Benhud_Andi"
  youtube        : "TMB_Room"
  medium         : "https://medium.com/@realabernard"

# ==========================
# Publication Categories
# ==========================
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# ==========================
# Site Settings
# ==========================
teaser            :
breadcrumbs       : false
words_per_minute  : 160
future            : true
read_more         : "disabled"
talkmap_link      : false
comments:
  provider        :

# ==========================
# Staticman Comments
# ==========================
staticman:
  allowedFields   : ['name', 'email', 'url', 'message']
  branch          : "master"   # restored to original
  commitMessage   : "New comment."
  filename        : comment-{@timestamp}
  format          : "yml"
  moderation      : true
  path            : "_data/comments/{options.slug}"
  requiredFields  : ['name', 'email', 'message']
  transforms:
    email         : "md5"
  generatedFields:
    date:
      type        : "date"
      options:
        format    : "iso8601"

# ==========================
# Atom Feed
# ==========================
atom_feed:
  hide             : false
  path             :

# ==========================
# SEO
# ==========================
google_site_verification  : "VdZXlIRuv1ueaEJNhT5YPgDq5PWGP35KtnlfFgpGgz0"
bing_site_verification    :
alexa_site_verification   :
yandex_site_verification  :

# ==========================
# Social Sharing
# ==========================
twitter:
  username        : &twitter
facebook:
  username        :
  app_id          :
  publisher       :
og_image           :
og_description     :
social:
  type            : Person
  name            :
  links           :

# ==========================
# Analytics
# ==========================
analytics:
  provider        : "false"
  google:
    tracking_id   :

# ==========================
# Files to Include / Exclude
# ==========================
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn

# ==========================
# Markdown / Conversion
# ==========================
encoding          : "utf-8"
markdown_ext      : "markdown,mkdown,mkdn,mkd,md"
markdown          : kramdown
highlighter       : rouge
lsi               : false
excerpt_separator : "\n\n"
incremental       : false

kramdown:
  input           : GFM
  hard_wrap       : false
  auto_ids        : true
  footnote_nr     : 1
  entity_output   : as_char
  toc_levels      : 1..6
  smart_quotes    : lsquo,rsquo,ldquo,rdquo
  enable_coderay  : false

# ==========================
# Collections
# ==========================
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# ==========================
# Defaults
# ==========================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout          : single
      author_profile  : true
      read_time       : true
      comments        : true
      share           : true
      related         : true

  - scope:
      path: ""
      type: pages
    values:
      layout          : single
      author_profile  : true

  - scope:
      path: ""
      type: publications
    values:
      layout          : single
      author_profile  : true
      share           : true
      comments        : true

  - scope:
      path: ""
      type: portfolio
    values:
      layout          : single
      author_profile  : true
      share           : true

  - scope:
      path: ""
      type: talks
    values:
      layout          : talk
      author_profile  : true
      share           : true

# ==========================
# Sass / SCSS
# ==========================
sass:
  sass_dir         : _sass
  style            : compressed

# ==========================
# Output / Plugins / Archives
# ==========================
permalink          : /:categories/:title/
timezone           : Etc/UTC
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type              : liquid
  path              : /categories/
tag_archive:
  type              : liquid
  path              : /tags/

# ==========================
# HTML Compression
# ==========================
compress_html:
  clippings         : all
  ignore:
    envs            : development